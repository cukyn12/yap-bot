<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yap Assistant - Ultra Pro Alpha</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-bg: #000000;
            --tg-text: #ffffff;
            --tg-button: #3390ec;
            --tg-button-text: #ffffff;
            --tg-secondary: #111111;
            --yap-neon: #00ffcc;
        }
        
        body { 
            background-color: var(--tg-bg); 
            color: var(--tg-text); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .yap-card { 
            background: var(--tg-secondary); 
            border-radius: 28px; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .loader { 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid var(--yap-neon); 
            border-radius: 50%; 
            width: 20px; height: 20px; 
            animation: spin 0.8s linear infinite; 
            display: inline-block; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #outputArea {
            font-style: normal !important;
            line-height: 1.7;
            white-space: pre-wrap;
            letter-spacing: -0.01em;
            color: rgba(255, 255, 255, 0.95);
        }

        .btn-premium {
            background: linear-gradient(135deg, #00ffcc 0%, #0099ff 100%);
            color: #000;
            box-shadow: 0 10px 25px rgba(0, 255, 204, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-premium:active { transform: scale(0.96); opacity: 0.9; }
        .btn-premium:disabled { opacity: 0.5; filter: grayscale(1); }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .hero-container {
            width: 100px; height: 100px;
            border-radius: 32px;
            background: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto;
            border: 2px solid var(--yap-neon);
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.1);
        }

        .error-box {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.2);
            color: #ff4444;
            padding: 12px;
            border-radius: 16px;
            font-size: 11px;
            margin-top: 10px;
            display: none;
            word-break: break-all;
            text-align: left;
        }

        .status-badge {
            font-size: 8px;
            background: rgba(0, 255, 204, 0.1);
            color: var(--yap-neon);
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.1em;
        }

        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-6 flex flex-col min-h-screen max-w-lg mx-auto">

    <header class="flex items-center justify-between mb-10 pt-2">
        <div class="flex items-center space-x-4">
            <div class="w-12 h-12 rounded-2xl bg-zinc-900 flex items-center justify-center text-white text-xl shadow-2xl border border-white/5">
                <i class="fas fa-bolt-lightning text-[#00ffcc]"></i>
            </div>
            <div>
                <h1 class="font-black text-lg tracking-tight uppercase italic text-white">Yap Assistant</h1>
                <p class="text-[9px] font-bold opacity-30 uppercase tracking-[0.3em] text-white">Multi-Engine Sniper</p>
            </div>
        </div>
        <div id="activeStatus" class="status-badge">ONLINE</div>
    </header>

    <div class="flex-grow space-y-6">
        <div class="hero-container mb-8">
            <img id="heroImg" src="Yapybara #86.png" alt="Hero" class="w-full h-full object-cover" 
                 onerror="this.style.display='none'; document.getElementById('heroFallback').classList.remove('hidden')">
            <div id="heroFallback" class="hidden text-[#00ffcc] text-4xl">
                <i class="fas fa-microchip"></i>
            </div>
        </div>

        <div class="relative">
            <textarea id="inputArea" placeholder="Paste alpha source context here..." 
                      class="w-full h-48 p-6 rounded-[28px] border-none text-[15px] yap-card focus:outline-none resize-none shadow-inner text-white placeholder-zinc-700"></textarea>
            <div class="absolute bottom-5 right-6 opacity-10 pointer-events-none">
                <i class="fas fa-quote-right text-2xl text-white"></i>
            </div>
        </div>
        
        <div>
            <button onclick="executeMultiChain()" id="genTextBtn" 
                    class="w-full py-5 rounded-[24px] font-black text-xs tracking-[0.2em] btn-premium flex items-center justify-center uppercase">
                <span id="btnContent"><i class="fas fa-fire-alt mr-3"></i> Generate Yap Post</span>
            </button>
            <div id="errorDisplay" class="error-box"></div>
        </div>

        <div id="textResultContainer" class="hidden space-y-4 fade-in">
            <div class="flex justify-between items-center px-2">
                <div class="flex items-center space-x-2">
                    <span class="w-2 h-2 rounded-full bg-[#00ffcc] animate-pulse"></span>
                    <span class="text-[10px] font-black opacity-40 uppercase tracking-widest text-[#00ffcc]">Alpha Ready</span>
                </div>
                <button onclick="copyYap()" class="text-[11px] text-blue-400 font-black flex items-center space-x-2 hover:opacity-70 bg-blue-400/10 px-4 py-2 rounded-full transition-all active:scale-95">
                    <i class="fas fa-copy"></i> <span>COPY</span>
                </button>
            </div>
            <div id="outputArea" class="p-8 rounded-[32px] yap-card text-[16px] font-semibold shadow-2xl border-l-4 border-[#00ffcc]"></div>
        </div>
    </div>

    <footer class="mt-12 mb-6 text-center">
        <p class="text-[9px] font-black opacity-10 uppercase tracking-[0.5em] text-white">Powered by Fail-Safe Alpha Protocol</p>
    </footer>

    <script>
        const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;

        // --- 1. API KEY ROTATOR (Cập nhật Key mới của bạn) ---
        const API_KEYS = [
            "AIzaSyAXmn6FLhwWwepcQRVIIPpmpg3_jhVRrb8"
        ];
        let currentKeyIndex = 0;

        // --- 2. MODEL FALLBACK CHAIN ---
        const MODEL_PRIORITY = [
            "gemini-2.0-flash", 
            "gemini-2.5-flash"
        ];

        if (tg) {
            tg.ready();
            tg.expand();
        }

        // --- 3. UNIVERSAL YAP FORMULA (CẤU TRÚC 3 GIAI ĐOẠN, KHÔNG DÙNG TÊN) ---
        const SYSTEM_PROMPT = `You are a professional 'Yap Assistant'. Your task is to transform any input into a 'Yap post' strictly following this universal formula:
1. Language: English only
2. Format: Exactly 4 to 5 lines long, use newline characters to separate lines
3. Structure: 
   - Line 1: Hook the reader by identifying the core signal, technical alpha, or critical trigger
   - Line 2-3: Define the strategic logic, analytical path, or entry point applied to the situation
   - Line 4-5: Conclude with high-speed execution results and bullish forward momentum
4. Punctuation: ABSOLUTELY NO periods (.) at the end of any line. Never end a line with a full stop. Commas (,) and question marks (?) are fine
5. Tone: Banger, elite hype, professional street smart, extreme bullish energy
6. NO character names (No Min, No Alex, No Andy)
7. NO tags, NO hashtags, NO markdown bolding`;

        function safeAlert(msg) {
            if (tg) {
                if (tg.version && parseFloat(tg.version) >= 6.2) {
                    tg.showPopup({ message: msg });
                } else {
                    tg.showAlert(msg);
                }
            } else {
                alert(msg);
            }
        }

        async function callGemini(apiKey, model, input) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: input }] }],
                systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            if (!response.ok) {
                throw { 
                    status: response.status, 
                    message: data.error?.message || 'Protocol Error',
                    code: data.error?.status || 'UNKNOWN'
                };
            }

            return data.candidates?.[0]?.content?.parts?.[0]?.text;
        }

        async function executeMultiChain() {
            const input = document.getElementById('inputArea').value.trim();
            const errBox = document.getElementById('errorDisplay');
            const statusBadge = document.getElementById('activeStatus');
            const btn = document.getElementById('genTextBtn');
            const btnContent = document.getElementById('btnContent');
            const output = document.getElementById('outputArea');
            const container = document.getElementById('textResultContainer');

            if (!input) {
                safeAlert("Yo, enter some alpha data first!");
                return;
            }

            btn.disabled = true; 
            errBox.style.display = 'none';
            let success = false;

            for (let m = 0; m < MODEL_PRIORITY.length; m++) {
                const activeModel = MODEL_PRIORITY[m];
                statusBadge.innerText = `LINKING ${activeModel.toUpperCase()}`;
                btnContent.innerHTML = `<div class="loader mr-3"></div> SWEEPING ALPHA...`;

                try {
                    const activeKey = API_KEYS[currentKeyIndex];
                    const text = await callGemini(activeKey, activeModel, input);

                    if (text) {
                        // Global post-processing: remove end periods from every line
                        const lines = text.trim().split('\n').map(line => line.trim().replace(/\.+$/, ''));
                        output.innerText = lines.join('\n');
                        
                        container.classList.remove('hidden');
                        output.scrollIntoView({ behavior: 'smooth' });
                        statusBadge.innerText = "ALPHA SYNCED";
                        if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                        success = true;
                        break; 
                    }
                } catch (err) {
                    console.warn(`[FAIL] Model: ${activeModel} | Error: ${err.message}`);
                    
                    if (err.status === 429 && API_KEYS.length > 1) {
                        currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
                        m--; 
                        continue;
                    }

                    if (m === MODEL_PRIORITY.length - 1) {
                        errBox.innerText = `Chain Exhausted: ${err.message}`;
                        errBox.style.display = 'block';
                        statusBadge.innerText = "FAILED";
                    }
                }
            }

            btn.disabled = false; 
            btnContent.innerHTML = '<i class="fas fa-fire-alt mr-3"></i> Generate Yap Post'; 
            if (!success && errBox.style.display === 'none') {
                safeAlert("The Alpha Chain is currently saturated. Try again later.");
            }
        }

        function copyYap() {
            const text = document.getElementById('outputArea').innerText;
            const el = document.createElement('textarea'); 
            el.value = text;
            document.body.appendChild(el); 
            el.select();
            document.execCommand('copy'); 
            document.body.removeChild(el);
            if (tg) {
                tg.showPopup({ message: "Alpha Copied to Clipboard!" });
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
        }

        window.onload = () => { if (tg) tg.expand(); };
    </script>
</body>
</html>
